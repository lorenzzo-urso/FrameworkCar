<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compadre — CAR no WhatsApp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="fone">
    <span class="modo" id="modo">demo</span>

    <div class="topo">
      <div class="avatar">🌱</div>
      <div>
        <div class="nome">Compadre</div>
        <div class="status">ajuda com o seu CAR · online</div>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="barra">
      <input id="entrada" type="text" placeholder="Mensagem" autocomplete="off" />
      <button id="enviar" title="Enviar">➤</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
